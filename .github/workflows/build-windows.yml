name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@8.15.8 --activate
          pnpm --version

      - name: Install frontend dependencies
        working-directory: front
        run: pnpm install --frozen-lockfile

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.1

      - name: Resolve build version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag" -and "${{ github.ref_name }}") {
            $version = "${{ github.ref_name }}"
          } else {
            $shortSha = "${{ github.sha }}".Substring(0, 7)
            $version = "dev-${{ github.run_number }}-$shortSha"
          }
          $version = $version.Trim()
          if ($version.StartsWith("v")) {
            $version = $version.Substring(1)
          }
          "app_version=$version" >> $env:GITHUB_OUTPUT
          "APP_VERSION=$version" >> $env:GITHUB_ENV
          "BUILD_COMMIT=${{ github.sha }}" >> $env:GITHUB_ENV
          "BUILD_TIME=$(Get-Date -Format 'yyyy-MM-ddTHH:mm:ssK')" >> $env:GITHUB_ENV

      - name: Build Windows executable
        shell: pwsh
        run: |
          $ldflags = "-X main.AppVersion=$env:APP_VERSION -X main.BuildCommit=$env:BUILD_COMMIT -X main.BuildTime=$env:BUILD_TIME"
          wails build -clean -platform windows/amd64 -webview2 download -ldflags "$ldflags"
          if (Test-Path "build/bin/ImageMaster.exe") {
            Rename-Item -Path "build/bin/ImageMaster.exe" -NewName "ImageMaster-$env:APP_VERSION.exe"
          }

      - name: Build JM runtime helper
        shell: pwsh
        run: |
          ./scripts/build_jm_runtime.ps1 -PythonExe py -PythonVersionArg -3.11
          New-Item -ItemType Directory -Force -Path "build/bin/runtime" | Out-Null
          Copy-Item -Force "runtime/imagemaster-jm-runtime.exe" "build/bin/runtime/imagemaster-jm-runtime.exe"

      - name: Package release zip
        shell: pwsh
        run: |
          $zipPath = "build/ImageMaster-$env:APP_VERSION-windows-amd64.zip"
          if (Test-Path $zipPath) {
            Remove-Item -Force $zipPath
          }
          Compress-Archive -Path "build/bin/*" -DestinationPath $zipPath

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ImageMaster-windows-amd64-${{ steps.version.outputs.app_version }}
          path: |
            build/bin/**
            build/ImageMaster-${{ steps.version.outputs.app_version }}-windows-amd64.zip
          if-no-files-found: error

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/ImageMaster-${{ steps.version.outputs.app_version }}-windows-amd64.zip
          generate_release_notes: true
